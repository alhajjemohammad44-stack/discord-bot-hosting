<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🤖 Discord Bot Hosting Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; padding: 20px; }
  .logo { font-size: 80px; margin-bottom: 20px; }
  h1 { font-size: 2em; margin-bottom: 10px; }
  p { color: #aaa; margin-bottom: 30px; max-width: 500px; line-height: 1.6; }
  .status { background: rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 12px; margin-bottom: 20px; }
  .status .dot { display: inline-block; width: 12px; height: 12px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; margin-left: 8px; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .btn { display: inline-block; background: #6c5ce7; color: white; text-decoration: none; padding: 14px 35px; border-radius: 10px; font-size: 16px; transition: 0.3s; margin: 5px; }
  .btn:hover { background: #5a4bd1; transform: translateY(-2px); }
  .btn-secondary { background: rgba(255,255,255,0.1); }
  .btn-secondary:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
  <div class="logo">🤖</div>
  <h1>Discord Bot Hosting Panel</h1>
  <p>لوحة تحكم لاستضافة بوتات الديسكورد مع إمكانية التحكم الكامل وإدارة البوتات</p>
  <div class="status"><span class="dot"></span> الخدمة شغالة 24/7</div>
  <a class="btn" href="https://breezy-monkeys-write.loca.lt" target="_blank">🚀 فتح لوحة التحكم</a>
  <a class="btn btn-secondary" href="https://github.com/alhajjemohammad44-stack/discord-bot-hosting-panel" target="_blank">📂 الكود المصدري</a>
  <p style="margin-top:30px;font-size:12px;color:#666;">⚠️ لوحة التحكم تعمل حاليًا عبر نفق مؤقت. للنشر الدائم 24/7 استخدم رابط Koyeb</p>
</body>
</html>
